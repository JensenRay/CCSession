name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            file

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: CCSession v__VERSION__
          releaseBody: |
            CCSession release binaries are unsigned.

            If you download the macOS build, remove the quarantine attribute first:

            xattr -dr com.apple.quarantine /Applications/CCSession.app

            After that, use Run Anyway in macOS Privacy & Security if macOS still blocks the app.

            If you do not trust the prebuilt binaries, build the app from source instead:

            1. Install Bun, Rust, and the Tauri prerequisites for your platform.
            2. Run `bun install`
            3. Run `bun tauri build`
          releaseDraft: false
          prerelease: false
